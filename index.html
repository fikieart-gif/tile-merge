      padding: 16px 0;
      background: linear-gradient(180deg, #00d179 0%, #009959 100%);
      box-shadow:
        0 -1.5px 1px 0 rgba(0, 2, 1, 0.55) inset,
        0 1.5px 1px 0 #2fffa8 inset;
    }

    /* Numbered tiles: plate + emblem + glow — один режим cover (без 100%×100% на дробных px ячейки, меньше артефактов на моб. WebKit). */
    .cell-face.tile-asset {
      background-color: #111827;
      background-image: none;
    }
    .tile-plate,
    .tile-plate-fail-crossfade,
    .tile-emblem,
    .tile-emblem-glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .tile-plate {
      z-index: 0;
    }
    .tile-plate-fail-crossfade {
      z-index: 2;
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }
    .tile-emblem-glow {
      z-index: 1;
      opacity: 0;
      transition: opacity 0.06s ease-in-out;
    }
    .cell-face.tile-asset.tile-emblem-glow-active .tile-emblem {
      opacity: 0;
    }
    .cell-face.tile-asset.tile-emblem-glow-active .tile-emblem-glow {
      opacity: 1;
    }
    .tile-emblem {
      z-index: 2;
      opacity: 1;
      transition: opacity 0.04s ease-in-out;
    }
    .tile-emblem.tile-emblem--hidden {
      display: none;
    }
    .cell-face.tile-asset .cell-level {
      display: none;
    }
    .crash-overlay {
      position: absolute;
      inset: 0;
      z-index: 2147483647;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.05);
      /* Длительность появления/исчезновения = CRASH_BADGE_REVEAL_MS в скрипте (65 ms). */
      transition:
        opacity 0.065s ease-out,
        transform 0.065s ease-out;
    }
    .crash-badge {
      display: inline-flex;
      padding: 35px 20px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      border-radius: 12px;
      border: 1px solid #ff4a49;
      background: rgba(33, 10, 16, 0.9);
    }
    .crash-badge-title-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
    }
    .crash-title {
      color: #ff4a49;
      text-align: center;
      leading-trim: both;
      text-edge: cap;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 32px;
      font-style: normal;
      font-weight: 700;
      line-height: 0;
      letter-spacing: -2px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .crash-overlay.visible {
      opacity: 1;
      transform: scale(1);
    }
    .no-pairs-overlay {
      position: absolute;
      inset: 0;
      z-index: 2147483647;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 0.03s ease-out, transform 0.03s ease-out;
    }
    .no-pairs-badge {
      display: inline-flex;
      padding: 35px 20px;
      flex-direction: column;
      align-items: center;
      gap: 0;
      border-radius: 12px;
      border: 1px solid rgba(169, 180, 202, 0.73);
      background:
        linear-gradient(90deg, rgba(156, 166, 187, 0.1) 0%, rgba(156, 166, 187, 0.1) 100%),
        #121218;
    }
    .no-pairs-badge-subtitle {
      margin-top: 20px;
      color: #fff;
      text-align: center;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: 0.14px;
      opacity: 0.5;
    }
    .no-pairs-badge-title-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
    }
    .no-pairs-badge .no-pairs-title {
      color: #9ca6bb;
      text-align: center;
      leading-trim: both;
      text-edge: cap;
      font-variant-numeric: lining-nums tabular-nums;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 32px;
      font-style: normal;
      font-weight: 700;
      line-height: 0;
      letter-spacing: -2px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .no-pairs-toast-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      /* Поверх .bet-sheet-backdrop и остальных слоёв .game */
      z-index: 2147483647;
      pointer-events: none;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      opacity: 0;
      transform: none;
      transition:
        opacity 0.24s ease-out,
        transform 0.24s cubic-bezier(0.22, 0.9, 0.3, 1);
    }
    .no-pairs-toast-overlay.no-pairs-toast-overlay--enter {
      transition: opacity 0.04s ease-out !important;
      transform: none !important;
    }
    .no-pairs-toast-overlay.no-pairs-toast-overlay--exit {
      opacity: 0 !important;
      transform: translateY(-12px) !important;
      transition:
        opacity 0.24s ease-out,
        transform 0.24s cubic-bezier(0.22, 0.9, 0.3, 1) !important;
    }
    .no-pairs-toast {
      position: relative;
      z-index: 1;
      width: 100%;
      border: 1.2px solid #00b875;
      border-radius: 16px;
      box-shadow: 0 2px 15px 0 rgba(10, 10, 14, 0.8);
      background:
        linear-gradient(180deg, rgba(0, 184, 117, 0.2) 0%, rgba(0, 184, 117, 0) 100%),
        #1a1a23;
    }
    .no-pairs-toast-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      padding: 12px 24px;
      overflow: hidden;
      border-radius: inherit;
    }
    .no-pairs-toast .no-pairs-title {
      color: #ffffff;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 22px;
      letter-spacing: -0.12px;
    }
    .no-pairs-toast .no-pairs-subtitle {
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 300;
      line-height: 20px;
      letter-spacing: 0.14px;
      text-transform: none;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      opacity: 1;
    }
    .no-pairs-toast .no-pairs-subtitle-muted {
      opacity: 0.5;
    }
    .no-pairs-toast .no-pairs-subtitle-amount {
      color: #00ffa2;
      text-align: center;
      leading-trim: both;
      text-edge: cap;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 700;
      line-height: 19.078px;
      letter-spacing: var(--font-body-semibold-letter-spacing, 0);
      opacity: 1;
    }
    .no-pairs-overlay.visible {
      opacity: 1;
      transform: scale(1);
    }
    .no-pairs-toast-overlay.visible {
      opacity: 1;
      transform: none;
    }

    /* Телефоны: нормальный масштаб (viewport) + ширина на весь экран, safe-area для «чёлки».
       Порог ширины = MOBILE_TILES_MAX_WIDTH_PX в скрипте (отдельные тайлы в assets/tiles/mobile/). */
    @media (max-width: 480px) {
      body {
        padding: max(12px, env(safe-area-inset-top, 0px)) 0 0;
        align-items: stretch;
      }
      .page-stack {
        max-width: none;
        width: 100%;
      }
      .app-header {
        max-width: none;
        align-self: stretch;
        border-radius: 0;
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
      }
      .app-subheader {
        max-width: none;
        align-self: stretch;
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
      }
      .game {
        max-width: none;
        width: 100%;
        align-self: stretch;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }
      .app-footer {
        width: calc(100% + 32px);
        margin-left: -16px;
        margin-right: -16px;
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
        padding-bottom: 6px;
      }
      .math-profile-bar {
        width: calc(100% + 32px);
        margin-left: -16px;
        margin-right: -16px;
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
        padding-bottom: max(12px, env(safe-area-inset-bottom, 0px));
      }
      .math-profile-switch {
        gap: 6px;
      }
      .math-profile-btn {
        padding: 3px 8px;
        min-height: 22px;
        border-radius: 6px;
        font-size: 11px;
        line-height: 14px;
      }
      .game {
        --app-footer-clearance: 68px;
        --math-profile-bar-height: calc(34px + env(safe-area-inset-bottom, 0px));
        --math-profile-bar-gap: 0px;
        --math-profile-bar-clearance: var(--math-profile-bar-height);
      }
    }

    /* Итог кэшаута (кэф ≥ 2): затемнение всей карточки .game (кэф, поле, кнопки, футер игры). */
    .cashout-celebration-overlay {
      position: absolute;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 20px 16px;
      border-radius: 24px 24px 0 0;
      background: rgba(14, 14, 18, 0.96);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.06s ease, visibility 0.06s ease;
    }
    .cashout-celebration-overlay.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .cashout-celebration-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
      max-width: min(340px, 92vw);
      font-family: "Inter", system-ui, sans-serif;
    }
    .cashout-celebration-kicker {
      margin: 0;
      color: #fff;
      text-align: center;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      opacity: 0.7;
    }
    .cashout-celebration-amount {
      margin: 16px 0 0;
      text-shadow:
        0 0 13.075px rgba(220, 106, 0, 0.5),
        0 0 2.058px rgba(255, 223, 146, 0.4);
      -webkit-text-stroke-width: 0.33px;
      -webkit-text-stroke-color: #000;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 32px;
      font-style: normal;
      font-weight: 700;
      line-height: normal;
      letter-spacing: 1.6px;
      background: linear-gradient(209deg, #ffd962 22.27%, #ffa73f 83.4%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .cashout-celebration-coeff {
      margin: 20px 0 0;
      display: inline-flex;
      padding: 10px 16px;
      justify-content: center;
      align-items: center;
      gap: 10px;
      border-radius: 8px;
      border: 1px solid #38f2b1;
      background: #1a4b40;
      box-sizing: border-box;
      color: #38f2b1;
      text-align: center;
      leading-trim: both;
      text-edge: cap;
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 500;
      line-height: var(--font-body-semibold-line-height, 20px);
      letter-spacing: var(--font-body-semibold-letter-spacing, 0);
    }
  </style>
</head>
<body>
<div

>

</div>
<div class="page-stack">

      height="28"

      decoding="async"

<div class="game" id="gameRoot">

<script src="assets/js/merge-flight.js?v=71"></script>
<script>
  let MAX_LEVEL, MIN_BET, TILE_CRASH, TILE_BONUS, BONUS_TILE_COEFF, COEFF_BY_LEVEL;
  let getCurrentStage, pickTileForEmptyCell, applyGravityWithSpawnMask, calcRoundCoeff;
  let isGridFullNoPairs, findPairs, coeffGainLabelForMerge, mergeLevelsFromPairs;

  const MATH_PROFILE_STORAGE_KEY = "mergeMvpMathProfile";

  function bindMathApi(m) {
    MAX_LEVEL = m.MAX_LEVEL;
    MIN_BET = m.MIN_BET;
    TILE_CRASH = m.TILE_CRASH;
    TILE_BONUS = m.TILE_BONUS;
    BONUS_TILE_COEFF = m.BONUS_TILE_COEFF;
    COEFF_BY_LEVEL = m.COEFF_BY_LEVEL;
    getCurrentStage = m.getCurrentStage;
    pickTileForEmptyCell = m.pickTileForEmptyCell;
    applyGravityWithSpawnMask = m.applyGravityWithSpawnMask;
    calcRoundCoeff = m.calcRoundCoeff;
    isGridFullNoPairs = m.isGridFullNoPairs;
    findPairs = m.findPairs;
    coeffGainLabelForMerge = m.coeffGainLabelForMerge;
    mergeLevelsFromPairs = m.mergeLevelsFromPairs;
  }

  function updateMathProfileButtons(activeId) {
    document.querySelectorAll(".math-profile-btn").forEach(function (btn) {

  function switchMathProfile(profileId) {

      localStorage.setItem(MATH_PROFILE_STORAGE_KEY, profileId);

    if (betSheetBackdrop && betSheetBackdrop.classList.contains("visible")) {
      betSheetBackdrop.classList.remove("visible");
      betSheetBackdrop.setAttribute("aria-hidden", "true");
    }
    isStepLockedByBetStart = false;
    hideCashoutCelebrationOverlay();
    hideNoPairsToastOverlay();
    if (crashOverlay) crashOverlay.classList.remove("visible");
    if (noPairsOverlay) noPairsOverlay.classList.remove("visible");

      winToastBackdrop.classList.remove("visible");
      winToastBackdrop.setAttribute("aria-hidden", "true");

    }
    resetSession();
    updateUI();
  }

  (function initMathProfile() {
    let saved = "math3";
    try {
      const stored = localStorage.getItem(MATH_PROFILE_STORAGE_KEY);
      if (stored === "math2" || stored === "math3") saved = stored;
    } catch (e) {}
    window.MergeGameMath.setActiveProfile(saved);
    bindMathApi(window.MergeGameMath);
    updateMathProfileButtons(saved);
  })();

  /** После подтверждения листа в UI ставки/выигрыша показываются суммы вместо «...» (localStorage). */
  const BET_SHEET_STORAGE_KEY = "mergeMvpBetSheetSeen";
  /** Базовая ставка сессии; задаётся стартовым листом или по умолчанию 10. */
  let baseBetAmount = 10;
  /**
   * Версия для query тайлов и бандла анимаций. При изменении поднимите также в head:
   * link merge-animations.css?v=… и script merge-flight.js?v=…
   */
  const TILE_ASSET_VERSION = "73";
  /**
   * Узкий экран: те же имена файлов в assets/tiles/mobile/ (см. @media max-width ниже в <style>).
   */
  const MOBILE_TILES_MAX_WIDTH_PX = 480;
  /**
   * sessionStorage: по одному разу на вкладку — полный прогрев (decode + кеш) до старта UI.
   * Иначе при совпадении localStorage оверлей снимали, а сеть/декод ещё не закончились.
   */
  const SESSION_ASSETS_WARM_KEY = "mergeMvpSessionAssetsWarmVer";

  /** Длительность появления бейджа CRASH и кроссфейда fail-плашек на остальных тайлах при краше (см. .crash-overlay, .tile-plate-fail-crossfade). */
  const CRASH_BADGE_REVEAL_MS = 65;
  /** Кэшаут с множителем ≥ этого значения — полноэкранный экран «Ваш выигрыш!». */
  const CASHOUT_CELEBRATION_MIN_COEFF = 2;
  const CASHOUT_CELEBRATION_DISPLAY_MS = 465;

  /* --- Тайминги анимаций ---
   * ANIMATION_SETTLE_BUFFER_MS должен совпадать с duration анимаций tile-merge-resolve в merge-animations.css.
   * При изменении CSS — обновлять MERGE_RESOLVE_MS и обратно. */
  const ANIMATION_SETTLE_BUFFER_MS = 7;    // буфер после окончания animation (rAF settle)
  const MERGE_SPAWN_POP_MS = 40;            // длительность tileSpawnPop
  const MERGE_SPAWN_SETTLE_BUFFER_MS = 7;   // запас после spawn до merge-pending
  const MERGE_PENDING_HIGHLIGHT_MS = 50;    // glow до полёта
  const MERGE_RESOLVE_MS = 55;              // длительность tile-merge-resolve animation (= CSS)
  const MERGE_CHAIN_GAP_AFTER_PATCH_MS = 30; // gap до следующего processMergeChain

  /* --- Тайминги "Нет пар" --- */
  const NO_PAIRS_BADGE_SHOW_DELAY_MS = 130;
  const NO_PAIRS_DIMM_AHEAD_MS = 55;   // затемнение карточек раньше бейджа
  const NO_PAIRS_BADGE_VISIBLE_MS = 250;
  const NO_PAIRS_TOAST_AFTER_BADGE_MS = 85;
  const NO_PAIRS_TOAST_DISMISS_AFTER_BET_SHEET_MS = 85;
  const NO_PAIRS_EMBLEMS_DESPAWN_AFTER_BADGE_HIDE_MS = 15;
  const GRID_FAIL_TO_MODAL_DELAY_MS = 25;

  /* ─── FLICKER DEBUG ──────────────────────────────────────────────────────
   * Включить: localStorage.setItem("flicker_debug","1") → обновить страницу.
   * Выключить: localStorage.removeItem("flicker_debug") → обновить страницу.
   * ─────────────────────────────────────────────────────────────────────── */
  const FLICKER_DEBUG = (function () {
    try { return localStorage.getItem("flicker_debug") === "1"; } catch (e) { return false; }
  })();
  const fdbg = (function () {
    if (!FLICKER_DEBUG) return { log: function () {}, warn: function () {} };
    const t0 = performance.now();
    function ts() { return (performance.now() - t0).toFixed(1) + "ms"; }
    return {
      log:  function (tag, msg, d) { d !== undefined ? console.log ("[" + ts() + "][" + tag + "] " + msg, d) : console.log ("[" + ts() + "][" + tag + "] " + msg); },
      warn: function (tag, msg, d) { d !== undefined ? console.warn("[" + ts() + "][" + tag + "] " + msg, d) : console.warn("[" + ts() + "][" + tag + "] " + msg); },
    };
  })();

  /* Монитор потери фокуса/фона — WebKit evict-ит GPU-текстуры когда вкладка скрыта. */
  (function () {
    if (!FLICKER_DEBUG) return;
    let hiddenAt = 0;
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "hidden") {
        hiddenAt = performance.now();
        fdbg.warn("VIS", "tab hidden — GPU textures will be evicted by WebKit");
      } else {
        const ms = hiddenAt ? (performance.now() - hiddenAt).toFixed(0) : "?";
        fdbg.warn("VIS", "tab visible again after " + ms + "ms — expect texture re-upload on next merge/spawn");
      }
    });
  })();

  function tileAssetUrl(relPath) {
    return relPath + "?v=" + encodeURIComponent(TILE_ASSET_VERSION);
  }

  function useMobileTileAssets() {
    try {
      return window.matchMedia(
        "(max-width: " + MOBILE_TILES_MAX_WIDTH_PX + "px)"
      ).matches;
    } catch (e) {
      return false;
    }
  }

  /** При узком экране — assets/tiles/mobile/<тот же путь после tiles/> */
  function tileAssetUrlForTiles(relPath) {
    if (!relPath || typeof relPath !== "string") {
      return tileAssetUrl(relPath);
    }
    if (!useMobileTileAssets()) {
      return tileAssetUrl(relPath);
    }
    const prefix = "assets/tiles/";
    if (relPath.indexOf(prefix) !== 0) {
      return tileAssetUrl(relPath);
    }
    const rest = relPath.slice(prefix.length);
    if (rest.indexOf("mobile/") === 0) {
      return tileAssetUrl(relPath);
    }
    return tileAssetUrl(prefix + "mobile/" + rest);
  }

  function tileBgUrlFromRel(relPath) {
    return "url('" + tileAssetUrlForTiles(relPath) + "')";
  }

  /**
   * Кэш decode по финальному URL — повторные merge того же уровня не создают новые Image.
   * Хранит { promise, img } — img удерживает декодированный bitmap в браузерном кеше,
   * предотвращая GC. Без явного хранения img WebKit evict-ит декодированные данные
   * после сборки мусора, и следующий CSS background-image render видит пустой первый кадр.
   */
  const tileImageDecodeByUrl = new Map();

  function preloadTileUrlDecoded(absUrl) {
    const cached = tileImageDecodeByUrl.get(absUrl);
    if (cached) {
      if (FLICKER_DEBUG) {
        const name = absUrl.split("?")[0].split("/").pop();
        const alive = cached.img && cached.img.naturalWidth > 0;
        if (!alive) {
          fdbg.warn("DECODE", "CACHE HIT but img NOT decoded (naturalWidth=0) — " + name + " — texture likely evicted");
        }
      }
      return cached.promise;
    }
    if (FLICKER_DEBUG) {
      fdbg.log("DECODE", "cache MISS — new Image() + decode for: " + absUrl.split("?")[0].split("/").pop());
    }
    const img = new Image();
    const p = new Promise(function (resolve) {
      img.onload = function () {
        try {
          if (typeof img.decode === "function") {
            img.decode().then(resolve).catch(resolve);
          } else {
            resolve();
          }
        } catch (e) {
          resolve();
        }
      };
      img.onerror = resolve;
      img.src = absUrl;
    });
    tileImageDecodeByUrl.set(absUrl, { promise: p, img: img });
    return p;
  }

  /**
   * Те же URL, что получит якорь после patch. Image.decode() до вставки DOM — иначе на моб. WebKit
   * первый кадр с новым background-image часто пустой (мерцание смены эмблемы); на десктопе реже.
   */
  function preloadMergedAnchorFaceUrls(level) {
    if (level === 0 || level == null) {
      return Promise.resolve();
    }
    const rels = [];
    if (level === TILE_CRASH) {
      rels.push(
        "assets/tiles/tile-crash-plate.png",
        "assets/tiles/tile-crash-emblem.png"
      );
    } else if (level === TILE_BONUS) {
      rels.push(
        "assets/tiles/tile-bonus-plate.png",
        "assets/tiles/tile-bonus-emblem.png"
      );
    } else {
      rels.push(
        "assets/tiles/tile-" + level + "-plate.png",
        "assets/tiles/tile-" + level + "-emblem.png",
        "assets/tiles/tile-" + level + "-emblem-glow.png"
      );
    }
    if (FLICKER_DEBUG) {
      rels.forEach(function (rel) {
        const url = tileAssetUrlForTiles(rel);
        const entry = tileImageDecodeByUrl.get(url);
        const hit = !!entry;
        const alive = hit && entry.img && entry.img.naturalWidth > 0;
        const name = rel.split("/").pop();
        if (!hit) {
          fdbg.warn("PRELOAD", "MISS for " + name + " — first time decode, level=" + level);
        } else if (!alive) {
          fdbg.warn("PRELOAD", "HIT but img DEAD (naturalWidth=0) for " + name + " — level=" + level + " — GC or eviction!");
        }
      });
    }
    return Promise.all(
      rels.map(function (rel) {
        return preloadTileUrlDecoded(tileAssetUrlForTiles(rel));
      })
    );
  }

  function pushTileAssetBothLayouts(urls, relPath) {
    urls.push(tileAssetUrl(relPath));
    const prefix = "assets/tiles/";
    if (relPath.indexOf(prefix) === 0) {
      urls.push(
        tileAssetUrl(prefix + "mobile/" + relPath.slice(prefix.length))
      );
    }
  }

  function getGameAssetUrlsToWarm() {
    const urls = [
      "assets/brand_logo.svg",
      "assets/header-button.svg",
      "assets/subheader-button.svg",
      "assets/subheader-sound.svg",
      "assets/subheader-info.svg",
      "assets/subheader-settings.svg",
      "assets/logoframe.svg",
      "assets/footer-bets.svg",
      "assets/footer-users.svg",
      "assets/win-toast.png",
    ];
    pushTileAssetBothLayouts(urls, "assets/tiles/tile-fail-plate.png");
    pushTileAssetBothLayouts(urls, "assets/tiles/tile-crash-plate.png");
    pushTileAssetBothLayouts(urls, "assets/tiles/tile-crash-emblem.png");
    pushTileAssetBothLayouts(urls, "assets/tiles/tile-bonus-plate.png");
    pushTileAssetBothLayouts(urls, "assets/tiles/tile-bonus-emblem.png");
    urls.push(tileAssetUrl("assets/merge-animations.css"));
    urls.push(tileAssetUrl("assets/js/merge-flight.js"));
    for (let lv = 1; lv <= 12; lv++) {
      pushTileAssetBothLayouts(urls, "assets/tiles/tile-" + lv + "-plate.png");
      pushTileAssetBothLayouts(urls, "assets/tiles/tile-" + lv + "-emblem.png");
      pushTileAssetBothLayouts(urls, "assets/tiles/tile-" + lv + "-emblem-glow.png");
    }
    return urls;
  }

  function warmOneAssetUrl(url) {
    const pathOnly = url.split("?")[0].toLowerCase();
    const rasterOrSvg =
      pathOnly.endsWith(".png") ||
      pathOnly.endsWith(".svg") ||
      pathOnly.endsWith(".jpg") ||
      pathOnly.endsWith(".jpeg") ||
      pathOnly.endsWith(".webp") ||
      pathOnly.endsWith(".gif");
    if (rasterOrSvg) {
      return preloadTileUrlDecoded(url);
    }
    return fetch(url, { mode: "same-origin", cache: "default" })
      .then(function () {})
      .catch(function () {});
  }

  function precacheMergeGameAssets() {
    const urls = getGameAssetUrlsToWarm();
    return Promise.all(urls.map(warmOneAssetUrl));
  }

  /**
   * После Image.decode() браузер гарантирует декод bitmap, но не загрузку в GPU
   * для CSS background-image. На мобильном WebKit GPU-upload происходит только при
   * реальном рендере через CSS pipeline. Без этого на refresh первый кадр merge пустой.
   *
   * Создаём скрытые div-элементы с background-image для каждого PNG-ассета,
   * выдерживаем два rAF (браузер успевает растеризовать и залить на GPU),
   * затем убираем элементы (img-объекты в Map удерживают кеш от GC).
   */
  function forceGpuTextureUpload() {
    const urls = getGameAssetUrlsToWarm().filter(function (url) {
      return /\.(png|jpg|jpeg|webp|gif)(\?|$)/i.test(url);
    });
    if (!urls.length) return Promise.resolve();
    fdbg.log("GPU", "forceGpuTextureUpload start — " + urls.length + " PNG assets");
    const gpuT = performance.now();
    return new Promise(function (resolve) {
      const host = document.createElement("div");
      host.id = "flicker-gpu-host";
      host.setAttribute("aria-hidden", "true");
      host.style.cssText =
        "position:fixed;left:-9999px;top:-9999px;" +
        "width:1px;height:1px;overflow:hidden;" +
        "pointer-events:none;will-change:transform;opacity:0.001;";
      urls.forEach(function (url) {
        const d = document.createElement("div");
        d.style.cssText =
          "width:1px;height:1px;" +
          "background:url('" + url + "') no-repeat center/cover;";
        host.appendChild(d);
      });
      document.body.appendChild(host);
      /* НЕ удаляем host — пока элемент в DOM с will-change:transform,
         GPU-слой и все текстуры остаются resident в compositor.
         Удаление host освобождает текстуры, что отменяет весь смысл preload. */
      requestAnimationFrame(function () {
        fdbg.log("GPU", "rAF1: " + (performance.now() - gpuT).toFixed(1) + "ms");
        requestAnimationFrame(function () {
          fdbg.log("GPU", "rAF2 complete: " + (performance.now() - gpuT).toFixed(1) + "ms — host in DOM: " + !!document.getElementById("flicker-gpu-host"));
          resolve();
        });
      });
    });
  }

  function shouldShowBlockingAssetWarm() {
    try {
      return sessionStorage.getItem(SESSION_ASSETS_WARM_KEY) !== TILE_ASSET_VERSION;
    } catch (e) {
      return true;
    }
  }

  function markSessionAssetsWarmed() {
    try {
      sessionStorage.setItem(SESSION_ASSETS_WARM_KEY, TILE_ASSET_VERSION);
    } catch (e) {}
  }

  function hideAssetPrecacheOverlay() {
    const el = document.getElementById("assetPrecacheOverlay");
    if (!el) return;
    el.classList.add("is-done");
    el.setAttribute("aria-hidden", "true");
    window.setTimeout(function () {
      el.classList.remove("is-active");
      el.classList.remove("is-done");
    }, 340);
  }

  function showAssetPrecacheOverlay() {
    const el = document.getElementById("assetPrecacheOverlay");
    if (!el) return;
    el.classList.remove("is-done");
    el.classList.add("is-active");
    el.setAttribute("aria-hidden", "false");
  }

  function formatCoeffPop(n) {
    if (!Number.isFinite(n) || n <= 0) return null;
    const rounded = Math.round(n * 100) / 100;
    if (rounded <= 0) return null;
    let s = rounded.toFixed(2);
    s = s.replace(/\.?0+$/, "");
    return "x" + s;
  }

  /** Полёт тайла при merge: assets/js/merge-flight.js */
  function runAnimateMergeSequence(pairs, onFlightsComplete, levels) {
    const fn =
      window.MergeGameAnimations && window.MergeGameAnimations.animateMergeSequence;
    if (typeof fn !== "function") {
      console.error("merge-flight.js: MergeGameAnimations.animateMergeSequence not found");
      onFlightsComplete();
      return;
    }
    fn(pairs, onFlightsComplete, levels, {
      getGridCellsSnapshot: getGridCellsSnapshot,
      registerPendingMergeCoeff: registerPendingMergeCoeff,
      coeffGainLabelForMerge: coeffGainLabelForMerge,
    });
  }

  // Обработка цепочки слияний: за один проход сливается только одна пара, затем рекурсия на новой сетке.
  // coeffBaseBeforeMergeStep — totalCoeff до слияний этого шага; totalCoeff обновляется один раз в конце цепочки
  function processMergeChain(
    levels,
    onDone,
    coeffBaseBeforeMergeStep,
    skipSpawnSettleDelay
  ) {
    const coeffBase = coeffBaseBeforeMergeStep;
    const pairsAll = findPairs(levels);
    const pairs =
      pairsAll && pairsAll.length > 0 ? [pairsAll[0]] : [];
    if (!pairs || pairs.length === 0) {
      const nextCoeff = coeffBase + calcRoundCoeff(levels);
      currentGrid = levels;
      /* Ждём завершения tile-merge-resolve анимации последнего merge перед тем как пересобрать DOM.
         Без этого updateUI() вызывает innerHTML="" через ~180ms (MERGE_CHAIN_GAP_AFTER_PATCH_MS),
         а анимация длится 340ms + 3×rAF ≈ 390ms — последний кадр обрезается. */
      runAfterMergeResolveSettled(function () {
        // Во время полёта +кэф основной коэффициент не пересчитываем.
        updateUI();
        const badgeCount = levels.reduce((acc, level) => {
          if (level === 0 || level == null || level === TILE_CRASH) {
            return acc;
          }
          return acc + 1;
        }, 0);
        const COEFF_RECALC_EARLIER_MS = 60;
        const coeffRecalcDelayMs = Math.max(
          0,
          70 + 130 + 285 + Math.max(0, badgeCount - 1) * 15 - COEFF_RECALC_EARLIER_MS
        );
        let coeffApplied = false;
        window.setTimeout(() => {
          if (coeffApplied) return;
          coeffApplied = true;
          totalCoeff = nextCoeff;
          updateUI(undefined, undefined, { skipGridRebuild: true });
          flashCoeffRecalc();
        }, coeffRecalcDelayMs);
        flyPendingMergeCoeffsToTotal(levels, () => {
          if (!coeffApplied) {
            coeffApplied = true;
            totalCoeff = nextCoeff;
            updateUI(undefined, undefined, { skipGridRebuild: true });
            flashCoeffRecalc();
          }
          onDone(levels);
        }, { skipGlint: isGridFullNoPairs(levels) });
      });
      return;
    }

    const mergeDecodePromise = preloadMergedAnchorFaceUrls(
      Math.min(levels[pairs[0][0]] + 1, MAX_LEVEL)
    );

    function clearMergePendingHighlight(preserveCellIndices) {
      if (!gridEl) return;
      const preserve =
        preserveCellIndices instanceof Set ? preserveCellIndices : null;
      gridEl.querySelectorAll(".cell-face.tile-asset").forEach(function (el) {
        if (!el.classList.contains("cell-face--merge-pending")) return;
        const cell = el.closest(".cell");
        if (!cell) return;
        const idx = Array.prototype.indexOf.call(gridEl.children, cell);
        if (idx < 0) return;
        if (preserve && preserve.has(idx)) return;
        el.classList.remove("cell-face--merge-pending", "tile-glow-frozen");
      });
    }

    function getMaxSpawnSettleDelayMs() {
      if (!gridEl) return 0;
      const faces = gridEl.querySelectorAll(".cell-face--spawn-in");
      if (!faces.length) return 0;
      let maxDelay = 0;
      for (let i = 0; i < faces.length; i++) {
        const raw = getComputedStyle(faces[i]).getPropertyValue("--spawn-delay").trim();
        let d = 0;
        const m = raw.match(/^([\d.]+)ms$/);
        if (m) d = parseFloat(m[1], 10) || 0;
        maxDelay = Math.max(maxDelay, d);
      }
      return maxDelay + MERGE_SPAWN_POP_MS + MERGE_SPAWN_SETTLE_BUFFER_MS;
    }

    function applyMergePendingHighlight(pairList) {
      const snapshot = getGridCellsSnapshot();
      pairList.forEach(function (pair) {
        const a = pair[0];
        const m = pair[1];
        [a, m].forEach(function (idx) {
          const cell = snapshot[idx];
          const face = cell && cell.querySelector(".cell-face.tile-asset");
          if (!face) return;
          if (!face.classList.contains("cell-face--merge-pending")) {
            face.classList.add("cell-face--merge-pending");
          }
          /* tile-glow-frozen уже установлен после предыдущего resolve — не сбрасываем,
             чтобы пропустить ramp-анимацию (glow уже на полной яркости). */
        });
      });
    }

    clearMergePendingHighlight(new Set([pairs[0][0], pairs[0][1]]));

    /* Первый merge шага ждёт spawn-in; для следующих пар — без внешнего setTimeout(0): иначе кадр
       после patch без merge-pending (мерцание перед «загоранием»). */
    const spawnSettleWaitMs = getMaxSpawnSettleDelayMs();

    const runMergeFlightPhase = function () {
      runAnimateMergeSequence(
        pairs,
        function () {
          const merged = mergeLevelsFromPairs(levels, pairs);
          currentGrid = merged;
          const anchorLevel = merged[pairs[0][0]];

          function applyPatchAndStartResolve() {
            patchGridCellsAfterOneMerge(merged, pairs[0]);
            /* Тройной rAF после смены background: WebKit нужно ≥2 кадра для GPU texture upload
               (1-й кадр — invalidate слоя, 2-й — upload декодированного bitmap, 3-й — stable). */
            const patchT = performance.now();
            fdbg.log("MERGE", "patch done → background-image changed, waiting 3×rAF before resolve anim");
            requestAnimationFrame(() => {
              fdbg.log("MERGE", "rAF1: " + (performance.now() - patchT).toFixed(1) + "ms after patch");
              requestAnimationFrame(() => {
                fdbg.log("MERGE", "rAF2: " + (performance.now() - patchT).toFixed(1) + "ms after patch");
                requestAnimationFrame(() => {
                  fdbg.log("MERGE", "rAF3: " + (performance.now() - patchT).toFixed(1) + "ms — adding tile-merge-resolve | gpu-host alive: " + !!document.getElementById("flicker-gpu-host"));
                  const cells = getGridCellsSnapshot();
                  const nextPairs = findPairs(merged);
                  const nextPair0 =
                    nextPairs && nextPairs.length > 0 ? nextPairs[0] : null;
                  pairs.forEach((pair) => {
                    const aIdx = pair[0];
                    const cell = cells[aIdx];
                    const face = cell && cell.querySelector(".cell-face");
                    if (!face || !face.classList.contains("tile-asset")) return;
                    const anchorJoinsNextMerge =
                      nextPair0 &&
                      (nextPair0[0] === aIdx || nextPair0[1] === aIdx);
                    /* Снимаем merge-pending в том же тике, что и tile-merge-resolve — иначе кадр без свечения
                       между патчем и анимацией (keyframes glow начинались с opacity: 0). */
                    face.classList.remove("cell-face--merge-pending");
                    face.classList.remove("tile-glow-frozen");
                    face.classList.add("tile-merge-resolve");
                    if (anchorJoinsNextMerge) {
                      face.classList.add("tile-merge-resolve--keep-glow");
                    }
                    window.setTimeout(() => {
                      face.classList.remove("tile-merge-resolve");
                      face.classList.remove("tile-merge-resolve--keep-glow");
                      if (anchorJoinsNextMerge) {
                        /* Переходим в frozen-pending: glow уже на полной яркости от keep-glow. */
                        face.classList.add("cell-face--merge-pending");
                        face.classList.add("tile-glow-frozen");
                      }
                    }, MERGE_RESOLVE_MS + ANIMATION_SETTLE_BUFFER_MS);
                  });
                });
              });
            });
            window.setTimeout(() => {
              processMergeChain(merged, onDone, coeffBase, true);
            }, MERGE_CHAIN_GAP_AFTER_PATCH_MS);
          }

          mergeDecodePromise
            .then(function () {
              return preloadMergedAnchorFaceUrls(anchorLevel);
            })
            .then(applyPatchAndStartResolve)
            .catch(applyPatchAndStartResolve);
        },
        levels
      );
    };

    if (skipSpawnSettleDelay === true) {
      applyMergePendingHighlight(pairs);
      window.setTimeout(function () {
        /* Glow держим до конца полёта; снимается при patchGridCellsAfterOneMerge (новые ячейки). */
        runMergeFlightPhase();
      }, MERGE_PENDING_HIGHLIGHT_MS);
    } else {
      window.setTimeout(function () {
        applyMergePendingHighlight(pairs);
        window.setTimeout(function () {
          /* Glow до полёта; снимается при patch следующей пары. */
          runMergeFlightPhase();
        }, MERGE_PENDING_HIGHLIGHT_MS);
      }, spawnSettleWaitMs);
    }
  }

  // ------- СОСТОЯНИЕ И UI -------

  let balance = 1000;
  let totalCoeff = 0.0;
  let roundIndex = 0;
  let currentGrid = new Array(9).fill(0);
  let sessionAlive = true;
  let sessionBet = 0;
  let isAnimating = false;
  let pendingWin = 0;
  let isStepLockedByBetStart = false;
  let bonusTileAppeared = false; // Флаг появления бонусного тайла в сессии
  // 1: гарантированный "нет пар" на 5 шаг, 2: гарантированный crash на 3 шаг, 3: гарантированный bonus на 3 шаг
  /** Накопленные «+кэф» за шаг: в ячейке до конца цепочки merge, затем полёт в coeffText */
  let pendingMergeCoeffs = [];
  let pendingMergeCoeffLayer = null;

  const gridEl = document.getElementById("grid");
  const pageStackEl = document.querySelector(".page-stack");
  /** Два промежутка по 6px между тремя колонками сетки (синхронно с gap в CSS). */
  const GRID_COL_GAPS_PX = 12;

  let lastIntegerPageStackW = -1;
  /** Карточка колонки — целая ширина в px (без дробных layout от flex/%). */
  function syncPageStackIntegerWidth() {
    if (!pageStackEl) return;
    const r = pageStackEl.getBoundingClientRect();
    const w = Math.max(1, Math.floor(r.width));
    if (w === lastIntegerPageStackW) return;
    lastIntegerPageStackW = w;
    pageStackEl.style.width = w + "px";
    pageStackEl.style.maxWidth = w + "px";
  }

  /**
   * Целая ширина ячейки сетки в px на любом viewport (не minmax(1fr)).
   * widthHintPx — при полной пересборке сетки до innerHTML.
   */
  function syncGridCellPxSnapped(widthHintPx) {
    if (!gridEl) return;
    const wRaw =
      typeof widthHintPx === "number" && widthHintPx >= 1
        ? widthHintPx
        : gridEl.getBoundingClientRect().width;
    const w = Math.max(1, Math.floor(wRaw));
    const cellPx = Math.max(1, Math.floor((w - GRID_COL_GAPS_PX) / 3));
    const prevRaw = gridEl.style.getPropertyValue("--grid-cell-px").trim();
    let prevNum = NaN;
    if (prevRaw.endsWith("px")) {
      prevNum = parseInt(prevRaw.slice(0, -2), 10);
    }
    if (
      gridEl.classList.contains("grid--snap-cells") &&
      prevNum === cellPx
    ) {
      return;
    }
    gridEl.style.setProperty("--grid-cell-px", cellPx + "px");
    gridEl.classList.add("grid--snap-cells");
  }

  let layoutIntegerSnapTimer = null;
  function scheduleLayoutIntegerSnap() {
    if (!gridEl || isAnimating) return;
    if (layoutIntegerSnapTimer != null) {
      clearTimeout(layoutIntegerSnapTimer);
    }
    layoutIntegerSnapTimer = window.setTimeout(function () {
      layoutIntegerSnapTimer = null;
      requestAnimationFrame(function () {
        syncPageStackIntegerWidth();
        syncGridCellPxSnapped();
      });
    }, 100);
  }

  try {
    window.addEventListener("resize", scheduleLayoutIntegerSnap);
    window.addEventListener("load", scheduleLayoutIntegerSnap);
  } catch (e) {
    void e;
  }

  try {
    const mqSnap = window.matchMedia(
      "(max-width: " + MOBILE_TILES_MAX_WIDTH_PX + "px)"
    );
    let mqSnapSyncTimer = null;
    const onSnapMqChange = function () {
      if (!gridEl || isAnimating) return;
      lastIntegerPageStackW = -1;
      if (mqSnapSyncTimer != null) {
        clearTimeout(mqSnapSyncTimer);
      }
      mqSnapSyncTimer = window.setTimeout(function () {
        mqSnapSyncTimer = null;
        requestAnimationFrame(function () {
          syncPageStackIntegerWidth();
          syncGridCellPxSnapped();
        });
      }, 80);
    };
    if (typeof mqSnap.addEventListener === "function") {
      mqSnap.addEventListener("change", onSnapMqChange);
    } else if (typeof mqSnap.addListener === "function") {
      mqSnap.addListener(onSnapMqChange);
    }
  } catch (e) {
    void e;
  }

  /** Ячейки только сетки 3×3, порядок = индекс 0…8 (не document.querySelectorAll — иначе ломается порядок/индексы). */
  function getGridCellsSnapshot() {
    if (!gridEl) return [];
    return Array.from(gridEl.children);
  }

  function getOrCreatePendingCoeffLayer() {
    if (pendingMergeCoeffLayer && pendingMergeCoeffLayer.parentNode) {
      return pendingMergeCoeffLayer;
    }
    const el = document.createElement("div");
    el.className = "merge-coeff-pending-layer";
    el.setAttribute("aria-hidden", "true");
    document.body.appendChild(el);
    pendingMergeCoeffLayer = el;
    return el;
  }

  function layoutPendingMergeCoeffs() {
    if (!pendingMergeCoeffs.length) {
      if (pendingMergeCoeffLayer) {
        pendingMergeCoeffLayer.replaceChildren();
      }
      return;
    }
    const layer = getOrCreatePendingCoeffLayer();
    layer.replaceChildren();
    const cells = getGridCellsSnapshot();
    const countByAnchor = {};
    pendingMergeCoeffs.forEach((entry) => {
      const n = countByAnchor[entry.anchorIdx] || 0;
      countByAnchor[entry.anchorIdx] = n + 1;
      const cell = cells[entry.anchorIdx];
      const face = cell && cell.querySelector(".cell-face");
      if (!face) return;
      const r = face.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return;
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2 + n * 17;
      const badge = document.createElement("span");
      badge.className = "merge-coeff-pending-badge";
      badge.textContent = entry.label;
      badge.style.left = cx + "px";
      badge.style.top = cy + "px";
      layer.appendChild(badge);
    });
  }

  function registerPendingMergeCoeff(anchorIdx, coeffValue) {
    const label = formatCoeffPop(coeffValue);
    if (!label) return;
    pendingMergeCoeffs.push({ anchorIdx: anchorIdx, label: label });
  }

  function runGridFailPreflash(done) {
    const GRID_FAIL_EMBLEM_MS = 30;
    const cells = getGridCellsSnapshot();
    cells.forEach((cell) => {
      const face = cell && cell.querySelector(".cell-face.tile-asset");
      if (!face) return;
      face.classList.add("tile-emblem-glow-active");
      const emblem = face.querySelector(".tile-emblem");
      const glow = face.querySelector(".tile-emblem-glow");
      if (emblem) {
        emblem.style.setProperty("opacity", "0.5", "important");
      }
      if (glow) {
        glow.style.setProperty("opacity", "0.5", "important");
      }
    });

    window.setTimeout(() => {
      if (typeof done === "function") done();
    }, GRID_FAIL_EMBLEM_MS);
  }

  function applyNoPairsFailVisuals(opts) {
    const plateFadeMs =
      opts && typeof opts.plateFadeMs === "number" ? opts.plateFadeMs : 0;
    const emblemOpacity =
      opts && typeof opts.emblemOpacity === "number"
        ? Math.max(0, Math.min(1, opts.emblemOpacity))
        : 0.2;
    const glowOpacity =
      opts && typeof opts.glowOpacity === "number"
        ? Math.max(0, Math.min(1, opts.glowOpacity))
        : emblemOpacity;
    const failUrl = tileBgUrlFromRel("assets/tiles/tile-fail-plate.png");
    const cells = getGridCellsSnapshot();
    cells.forEach((cell) => {
      const face = cell && cell.querySelector(".cell-face.tile-asset");
      if (!face) return;
      face.classList.remove("tile-emblem-glow-active");
      const plate = face.querySelector(".tile-plate");
      if (!plate) return;

      if (plateFadeMs > 0) {
        if (face.querySelector(".tile-plate-fail-crossfade")) return;
        const overlay = document.createElement("span");
        overlay.className = "tile-plate-fail-crossfade";
        overlay.setAttribute("aria-hidden", "true");
        overlay.style.backgroundImage = failUrl;
        overlay.style.transition = "opacity " + plateFadeMs + "ms ease-out";
        overlay.style.opacity = "0";
        const glowEl = face.querySelector(".tile-emblem-glow");
        if (glowEl) {
          face.insertBefore(overlay, glowEl);
        } else {
          face.insertBefore(overlay, plate.nextSibling);
        }
        const emblem = face.querySelector(".tile-emblem");
        const glow = face.querySelector(".tile-emblem-glow");
        /* Запускаем fade плашки и эмблемы одновременно */
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            overlay.style.opacity = "1";
            if (emblem) {
              emblem.style.transition = "opacity " + plateFadeMs + "ms ease-out";
              emblem.style.setProperty("opacity", String(emblemOpacity), "important");
            }
            if (glow) {
              glow.style.transition = "opacity " + plateFadeMs + "ms ease-out";
              glow.style.setProperty("opacity", "0", "important");
            }
          });
        });
        window.setTimeout(() => {
          plate.style.backgroundImage = failUrl;
          overlay.remove();
          face.classList.add("tile-fail-muted");
          if (emblem) emblem.style.transition = "";
          if (glow) glow.style.transition = "";
        }, plateFadeMs);
      } else {
        plate.style.backgroundImage = failUrl;
        face.classList.add("tile-fail-muted");
        const emblem = face.querySelector(".tile-emblem");
        const glow = face.querySelector(".tile-emblem-glow");
        if (emblem) {
          emblem.style.setProperty("opacity", String(emblemOpacity), "important");
        }
        if (glow) {
          glow.style.setProperty("opacity", String(glowOpacity), "important");
        }
      }
    });
  }

  function suppressEmblemGlowForCrash() {
    const cells = getGridCellsSnapshot();
    cells.forEach((cell) => {
      const face = cell && cell.querySelector(".cell-face.tile-asset");
      if (!face) return;
      face.classList.remove("tile-emblem-glow-active");
      const emblem = face.querySelector(".tile-emblem");
      const glow = face.querySelector(".tile-emblem-glow");
      if (emblem) {
        emblem.style.setProperty("opacity", "0.5", "important");
      }
      if (glow) {
        glow.style.setProperty("opacity", "0", "important");
      }
    });
  }

  function clearTransientMergeVisualState() {
    const cells = getGridCellsSnapshot();
    cells.forEach((cell) => {
      const face = cell && cell.querySelector(".cell-face.tile-asset");
      if (!face) return;
      face.classList.remove(
        "tile-merge-resolve",
        "tile-merge-resolve--keep-glow",
        "cell-face--merge-pending",
        "tile-glow-frozen"
      );
    });
  }

  function runAfterMergeResolveSettled(done) {
    if (typeof done !== "function") return;
    let frames = 0;
    const MAX_FRAMES = 42; // ~700ms @60fps safety cap
    const tick = () => {
      const hasResolve = !!(
        gridEl && gridEl.querySelector(".cell-face.tile-asset.tile-merge-resolve")
      );
      if (!hasResolve || frames >= MAX_FRAMES) {
        done();
        return;
      }
      frames += 1;
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  function animateGridFailDespawn(done) {
    const cells = getGridCellsSnapshot();
    const faceEntries = [];
    cells.forEach((cell, idx) => {
      const face = cell && cell.querySelector(".cell-face");
      if (!face) return;
      faceEntries.push({ idx: idx, face: face });
    });
    if (faceEntries.length === 0) {
      if (typeof done === "function") done();
      return;
    }

    const DESPAWN_DUR_MS = 35;
    faceEntries.forEach((entry) => {
      entry.face.classList.remove("cell-face--despawn-out");
      void entry.face.offsetWidth;
      entry.face.classList.add("cell-face--despawn-out");
    });

    const totalMs = DESPAWN_DUR_MS + ANIMATION_SETTLE_BUFFER_MS;
    window.setTimeout(() => {
      if (typeof done === "function") done();
    }, totalMs);
  }

  function flyPendingMergeCoeffsToTotal(levels, done, opts) {
    const layer = getOrCreatePendingCoeffLayer();
    pendingMergeCoeffs = [];
    layer.replaceChildren();

    if (!levels) {
      if (typeof done === "function") done();
      return;
    }

    const cells = getGridCellsSnapshot();
    const badges = [];
    const glintFaces = [];
    for (let i = 0; i < levels.length; i++) {
      const level = levels[i];
      if (level === 0 || level == null || level === TILE_CRASH) continue;
      const cell = cells[i];
      const face = cell && cell.querySelector(".cell-face");
      if (!face) continue;
      glintFaces.push(face);
      const r = face.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) continue;
      const coeffValue =
        level === TILE_BONUS ? BONUS_TILE_COEFF : COEFF_BY_LEVEL[level] || 0;
      const label = formatCoeffPop(coeffValue);
      if (!label) continue;
      const badge = document.createElement("span");
      badge.className = "merge-coeff-pending-badge";
      badge.textContent = label;
      const holdTopDy = -(r.height * 0.22) - 15;
      badge.dataset.holdDy = String(holdTopDy);
      badge.style.left = r.left + r.width / 2 + "px";
      badge.style.top = r.top + r.height / 2 + "px";
      layer.appendChild(badge);
      badges.push(badge);
    }

    if (badges.length === 0) {
      if (typeof done === "function") done();
      return;
    }

    const skipGlint = opts && opts.skipGlint;
    if (!skipGlint) {
      glintFaces.forEach((face, idx) => {
        const delay = idx * 18;
        window.setTimeout(() => {
          face.classList.remove("tile-merge-resolve");
          face.classList.remove("tile-final-glint");
          void face.offsetWidth;
          face.classList.add("tile-final-glint");
          window.setTimeout(() => {
            face.classList.remove("tile-final-glint");
          }, 90);
        }, delay);
      });
    }

    let settled = false;
    const settle = () => {
      if (settled) return;
      settled = true;
      try {
        layer.replaceChildren();
      } catch (e) {}
      if (typeof done === "function") done();
    };
    let remaining = badges.length;
    const finishOne = () => {
      if (settled) return;
      remaining--;
      if (remaining <= 0) settle();
    };
    function getCoeffTargetPoint() {
      if (coeffFlyAnchor && coeffFlyAnchor.getBoundingClientRect) {
        const ar = coeffFlyAnchor.getBoundingClientRect();
        if (ar && ar.width >= 0 && ar.height >= 0) {
          return {
            x: ar.left + ar.width / 2,
            y: ar.top + ar.height / 2,
          };
        }
      }
      return null;
    }
    const burstDur = 70;
    const holdInCellMs = 130;
    const arcDur = 285;
    const perBadgeDelay = 15;
    badges.forEach((badge, i) => {
      const delay = i * perBadgeDelay;
      const startX = parseFloat(badge.style.left) || 0;
      const startY = parseFloat(badge.style.top) || 0;
      const holdDx = 0;
      const holdDy = parseFloat(badge.dataset.holdDy || "") || -16;
      const burstDx = 0;
      const burstDy = holdDy * 0.72;
      const endFly = () => {
        try {
          badge.remove();
        } catch (e2) {}
        finishOne();
      };
      if (typeof badge.animate === "function") {
        try {
          const burstAndHold = badge.animate(
            [
              {
                transform: "translate(-50%, -50%) translate(0px, 0px) scale(0.65)",
                opacity: 0,
              },
              {
                transform:
                  "translate(-50%, -50%) translate(" +
                  burstDx +
                  "px, " +
                  burstDy +
                  "px) scale(0.98)",
                opacity: 1,
                offset: 0.35,
              },
              {
                transform:
                  "translate(-50%, -50%) translate(" +
                  holdDx +
                  "px, " +
                  holdDy +
                  "px) scale(1)",
                opacity: 1,
                offset: 1,
              },
            ],
            {
              duration: burstDur + holdInCellMs,
              delay: delay,
              easing: "cubic-bezier(0.16, 1, 0.3, 1)",
              fill: "forwards",
            }
          );
          const startArc = () => {
            try {
              const targetPoint = getCoeffTargetPoint();
              const targetX = targetPoint ? targetPoint.x : startX;
              const targetY = targetPoint ? targetPoint.y : startY;
              const endDx = targetX - startX - holdDx;
              const endDy = targetY - startY - holdDy;
              const arcAnim = badge.animate(
                [
                  {
                    transform:
                      "translate(-50%, -50%) translate(" +
                      holdDx +
                      "px, " +
                      holdDy +
                      "px) scale(1)",
                    opacity: 1,
                  },
                  {
                    transform:
                      "translate(-50%, -50%) translate(" +
                      endDx +
                      "px, " +
                      endDy +
                      "px) scale(0.9)",
                    opacity: 0,
                    offset: 0.94,
                  },
                  {
                    transform:
                      "translate(-50%, -50%) translate(" +
                      endDx +
                      "px, " +
                      endDy +
                      "px) scale(0.9)",
                    opacity: 0,
                  },
                ],
                {
                  duration: arcDur,
                  easing: "cubic-bezier(0.22, 1, 0.36, 1)",
                  fill: "forwards",
                }
              );
              if (arcAnim && arcAnim.finished) {
                arcAnim.finished.then(endFly).catch(endFly);
              } else {
                window.setTimeout(endFly, arcDur + 24);
              }
            } catch (eArc) {
              window.setTimeout(endFly, arcDur + 24);
            }
          };
          if (burstAndHold && burstAndHold.finished) {
            burstAndHold.finished.then(startArc).catch(startArc);
          } else {
            window.setTimeout(startArc, burstDur + holdInCellMs + delay + 24);
          }
        } catch (e3) {
          window.setTimeout(endFly, burstDur + holdInCellMs + arcDur + delay + 24);
        }
      } else {
        window.setTimeout(endFly, burstDur + holdInCellMs + arcDur + delay + 24);
      }
    });
    window.setTimeout(() => {
      if (settled) return;
      badges.forEach((b) => {
        try {
          b.remove();
        } catch (e4) {}
      });
      settle();
    }, burstDur + holdInCellMs + arcDur + (badges.length - 1) * perBadgeDelay + 180);
  }

  /** Same ordering/randomness as in updateUI for --spawn-delay (bomb last among multi-spawn). */
  function computeSpawnDelays(spawnInMask, grid) {
    const spawnDelayByIndex = {};
    if (!spawnInMask) return spawnDelayByIndex;
    const spawnOrder = [];
    for (let i = 0; i < spawnInMask.length; i++) {
      if (spawnInMask[i]) spawnOrder.push(i);
    }
    for (let i = spawnOrder.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      const t = spawnOrder[i];
      spawnOrder[i] = spawnOrder[j];
      spawnOrder[j] = t;
    }
    const crashAt = spawnOrder.findIndex((idx) => grid[idx] === TILE_CRASH);
    if (crashAt !== -1 && spawnOrder.length > 1) {
      const [crashIdx] = spawnOrder.splice(crashAt, 1);
      spawnOrder.push(crashIdx);
    }
    spawnOrder.forEach((idx, order) => {
      /* 50ms base: даёт браузеру ≥1 rAF-кадр для GPU texture upload до первого видимого кадра спавна.
         Без этого WebKit может показать пустой первый кадр при opacity > 0. */
      spawnDelayByIndex[idx] = 25 + order * 27 + ((Math.random() * 11) | 0);
    });
    return spawnDelayByIndex;
  }

  function buildGridCellElement(level, index, spawnInMask, spawnDelayByIndex) {
    const cell = document.createElement("div");

      if (level === TILE_CRASH) {

        crashEmblem.style.backgroundImage = tileBgUrlFromRel(
          "assets/tiles/tile-crash-emblem.png"
        );

        face.appendChild(crashEmblem);
        span.textContent = "";
      } else if (level === TILE_BONUS) {
        cell.className = "cell";
        face.className = "cell-face tile-asset";
        cell.removeAttribute("aria-label");
        const plate = document.createElement("span");
        plate.className = "tile-plate";
        plate.setAttribute("aria-hidden", "true");
        const emblem = document.createElement("span");
        emblem.className = "tile-emblem";
        emblem.setAttribute("aria-hidden", "true");
        plate.style.backgroundImage = tileBgUrlFromRel(
          "assets/tiles/tile-bonus-plate.png"
        );
        emblem.style.backgroundImage = tileBgUrlFromRel(
          "assets/tiles/tile-bonus-emblem.png"
        );
        face.appendChild(plate);
        face.appendChild(emblem);
        span.textContent = "";
      } else {
        cell.className = "cell";
        face.className = "cell-face tile-asset";
        const plate = document.createElement("span");
        plate.className = "tile-plate";
        plate.setAttribute("aria-hidden", "true");
        const emblem = document.createElement("span");
        emblem.className = "tile-emblem";
        emblem.setAttribute("aria-hidden", "true");
        plate.style.backgroundImage = tileBgUrlFromRel(
          "assets/tiles/tile-" + level + "-plate.png"
        );
        const emblemExt = "png";

          "assets/tiles/tile-" + level + "-emblem." + emblemExt
        );
        face.setAttribute("aria-label", "Тайл уровня " + level);
        span.textContent = "";
        face.appendChild(plate);
        const emblemGlow = document.createElement("span");
        emblemGlow.className = "tile-emblem-glow";
        emblemGlow.setAttribute("aria-hidden", "true");
        emblemGlow.style.backgroundImage = tileBgUrlFromRel(
          "assets/tiles/tile-" + level + "-emblem-glow." + emblemExt
        );
        face.appendChild(emblemGlow);
        face.appendChild(emblem);
      }

      face.appendChild(span);
      if (spawnInMask && spawnInMask[index]) {
        const spawnDelayMs = spawnDelayByIndex[index] || 0;
        face.style.setProperty("--spawn-delay", spawnDelayMs + "ms");
        if (level === TILE_CRASH) {
          face.classList.add("cell-face--crash-spawn-fade");
        } else {
          face.classList.add("cell-face--spawn-in");

      } else {

      cell.appendChild(face);

    );

  /** После одной пары merge: якорь — смена уровня in-place; mover — пустая ячейка. Fallback: replaceChild. */
  function patchGridCellsAfterOneMerge(mergedLevels, pair) {
    if (!gridEl || gridEl.children.length !== 9 || !pair) {
      updateUI();
      return;
    }
    const anchorIdx = pair[0];
    const moverIdx = pair[1];
    const anchorLv = mergedLevels[anchorIdx];
    const moverLv = mergedLevels[moverIdx];
    const oldAnchor = gridEl.children[anchorIdx];
    const oldMover = gridEl.children[moverIdx];
    const anchorFace = oldAnchor && oldAnchor.querySelector(".cell-face.tile-asset");
    const canPatchInPlace =
      anchorFace &&
      moverLv === 0 &&
      anchorLv > 0 &&
      anchorLv !== TILE_CRASH &&
      anchorLv !== TILE_BONUS;

    if (canPatchInPlace && applyNormalTileLevelToFace(anchorFace, anchorLv)) {
      setCellEmptyInPlace(oldMover);
      /* merge-pending снимаем только в applyPatchAndStartResolve вместе с tile-merge-resolve —
         иначе до double rAF новый тайл один кадр без свечения. */
    } else {
      const noSpawn = {};
      gridEl.replaceChild(
        buildGridCellElement(mergedLevels[anchorIdx], anchorIdx, null, noSpawn),
        oldAnchor
      );
      gridEl.replaceChild(
        buildGridCellElement(mergedLevels[moverIdx], moverIdx, null, noSpawn),
        oldMover
      );
      const anchorCellAfter = gridEl.children[anchorIdx];
      const anchorFaceAfter =
        anchorCellAfter && anchorCellAfter.querySelector(".cell-face.tile-asset");
      if (anchorFaceAfter) {
        anchorFaceAfter.classList.add("cell-face--merge-pending");
      }
    }
    updateFooterChrome();
  }

  function updateUI(spawnInMask, spawnDelayByIndexOverride, uiOpts) {
    uiOpts = uiOpts || {};
    const skipGridRebuild = uiOpts.skipGridRebuild === true;
    const isBetSheetVisible = !!(
      betSheetBackdrop && betSheetBackdrop.classList.contains("visible")
    );
    if (subheaderBalance) {
      subheaderBalance.textContent = formatMoney(balance);
    }
    coeffText.textContent = isBetSheetVisible ? "..." : "x" + totalCoeff.toFixed(2);
    coeffText.classList.toggle("coeff-value--active", sessionBet > 0);
    if (isBetSheetVisible || !hasConfirmedBetSheet()) {
      coeffStakeAmount.textContent = "...";
      coeffWinAmount.textContent = "...";
    } else {
      const stakeShown = sessionBet > 0 ? sessionBet : baseBetAmount;
      coeffStakeAmount.textContent = formatMoney(stakeShown);
      const moveShown = sessionBet > 0 ? roundIndex : 0;
      coeffWinAmount.textContent = String(moveShown);
    }

    if (skipGridRebuild) {
      updateFooterChrome();
      return;
    }

    gridEl.innerHTML = "";
    const spawnDelayByIndex =
      spawnInMask && spawnDelayByIndexOverride !== undefined
        ? spawnDelayByIndexOverride
        : spawnInMask
          ? computeSpawnDelays(spawnInMask, currentGrid)
          : {};
    currentGrid.forEach((level, index) => {
      gridEl.appendChild(
        buildGridCellElement(level, index, spawnInMask, spawnDelayByIndex)
      );
    });

    updateFooterChrome();
    /* Двойной rAF: стабильная геометрия после innerHTML. Ширину .page-stack не трогаем здесь —
       при каждом GO иначе на проде дрожит inline-width (субпиксель / адресная строка) и пересчитывается
       вся сетка как после «пересборки». См. scheduleLayoutIntegerSnap на resize/load. */
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        syncGridCellPxSnapped();
      });
    });
  }

  /* Не вешаем updateUI на resize: на мобилке скачет innerWidth (chrome URL bar) — полная пересборка сетки даёт мерцание фонов. */
  window.addEventListener("orientationchange", function () {
    window.setTimeout(function () {
      if (isAnimating || !gridEl) return;
      updateUI();
      scheduleLayoutIntegerSnap();
    }, 320);

  function resetSession(opts) {

    roundIndex = 0;
    currentGrid = new Array(9).fill(0);

    sessionBet = 0;

  function handleCollect() {

    if (pendingWin > 0) {
      balance += pendingWin;

    pendingWin = 0;

      winToastBackdrop.classList.remove("visible");
      winToastBackdrop.setAttribute("aria-hidden", "true");

  function finalizeFailWithoutWinModal(winAmount, finalizeOpts) {
    finalizeOpts = finalizeOpts || {};
    hideCashoutCelebrationOverlay();
    if (winAmount > 0) {
      balance += winAmount;
    }
    pendingWin = 0;
    const toastDismissMs = finalizeOpts.noPairsToastDismissAfterBetSheetMs;
    const delayToastDismiss =
      typeof toastDismissMs === "number" && toastDismissMs > 0;
    resetSession(
      delayToastDismiss ? { skipNoPairsToastOverlayHide: true } : undefined
    );
    requestAnimationFrame(function () {
      openBetSheet();
      if (delayToastDismiss) {

  function playRound() {
    if (isAnimating) return;
    if (!sessionAlive) {
      return;
    }

    let bet;
    if (roundIndex === 0) {
      bet = baseBetAmount;
      if (bet > balance) {
        return;
      }
      balance -= bet;
      sessionBet = bet;
    } else {
      bet = sessionBet;
    }

    roundIndex += 1;
    isAnimating = true;
    updateUI();

    const stage = getCurrentStage(totalCoeff);
    const levels = currentGrid.slice();
    const spawnMaskThisStep = new Array(9).fill(false);

    let bonusAppearedThisRound = false;
    let crashSpawnedThisRound = false;
    for (let i = 0; i < 9; i++) {
      if (crashSpawnedThisRound) {
        continue;
      }
      if (levels[i] === 0) {
        const tile = pickTileForEmptyCell(stage, levels, bonusTileAppeared, totalCoeff, roundIndex);

        if (tile === TILE_BONUS) {
          bonusTileAppeared = true;
          bonusAppearedThisRound = true;
        }
        if (tile === TILE_CRASH) {
          crashSpawnedThisRound = true;
        }

        levels[i] = tile;
        spawnMaskThisStep[i] = true;
      }
    }

    // Краш — поражение: ставка уже списана, выигрыш 0, баланс не пополняем.
    if (levels.some(l => l === TILE_CRASH)) {
      const { grid: fallen, spawnMask: spawnAfterFall } = applyGravityWithSpawnMask(
        levels,
        spawnMaskThisStep
      );
      currentGrid = fallen;
      totalCoeff = 0;

      const crashSpawnDelays = computeSpawnDelays(spawnAfterFall, currentGrid);
      let crashFxStartDelayMs = 0;
      for (let ci = 0; ci < 9; ci++) {
        if (spawnAfterFall[ci] && currentGrid[ci] === TILE_CRASH) {
          crashFxStartDelayMs = crashSpawnDelays[ci] || 0;
          break;
        }
      }
      updateUI(spawnAfterFall, crashSpawnDelays);
      sessionAlive = false;
      const finalWin = 0;
      const CRASH_VIBRATE_MS = 130;
      const CRASH_VIBRATE_OVERLAP_MS = 15;
      window.setTimeout(() => {
        const fieldShellEl = gridEl.closest(".field-shell");
        crashOverlay.classList.add("visible");
        applyNoPairsFailVisuals({
          plateFadeMs: CRASH_BADGE_REVEAL_MS,
          emblemOpacity: 0.2,
        });
        suppressEmblemGlowForCrash();
        if (fieldShellEl) {
          fieldShellEl.classList.remove("field-shell--crash-vibrate");
          void fieldShellEl.offsetWidth;
          fieldShellEl.classList.add("field-shell--crash-vibrate");
        }

        window.setTimeout(() => {
          const CRASH_PRE_DESPAWN_DELAY_MS = 110;
          const CRASH_GLOW_PHASE_DELAY_MS = 30;
          window.setTimeout(() => {
            window.setTimeout(() => {
              crashOverlay.classList.remove("visible");
              if (fieldShellEl) {
                fieldShellEl.classList.remove("field-shell--crash-vibrate");
              }
              animateGridFailDespawn(() => {
                const CRASH_TO_RESET_DELAY_MS = 25;
                window.setTimeout(() => {
                  currentGrid = new Array(9).fill(0);
                  isAnimating = false;
                  isStepLockedByBetStart = false;
                  finalizeFailWithoutWinModal(finalWin);
                }, CRASH_TO_RESET_DELAY_MS);
              });
            }, CRASH_GLOW_PHASE_DELAY_MS);
          }, CRASH_PRE_DESPAWN_DELAY_MS);
        }, Math.max(0, CRASH_VIBRATE_MS - CRASH_VIBRATE_OVERLAP_MS));
      }, crashFxStartDelayMs);

      return;
    }

    const { grid: fallen, spawnMask: spawnAfterFall } = applyGravityWithSpawnMask(
      levels,
      spawnMaskThisStep
    );
    currentGrid = fallen;
    updateUI(spawnAfterFall);

    setTimeout(() => {
      const coeffBaseBeforeMergeStep = totalCoeff;
      pendingMergeCoeffs = [];
      if (pendingMergeCoeffLayer) {
        pendingMergeCoeffLayer.replaceChildren();
      }
      processMergeChain(fallen, (finalGrid) => {
        let merged = finalGrid;
        currentGrid = merged;

        /* Сетка уже пересобрана в processMergeChain (ветка без пар) + кэф обновлён таймаутом/fly — без второго innerHTML. */
        updateUI(undefined, undefined, { skipGridRebuild: true });

        if (isGridFullNoPairs(merged)) {
          sessionAlive = false;
          const finalWin = sessionBet * totalCoeff;
          setTopToastTitle("Нет пар!");
          setNoPairsToastWinAmount(finalWin);
          runAfterMergeResolveSettled(() => {
            /* Затемнение карточек чуть раньше бейджа */
            window.setTimeout(() => {
              clearTransientMergeVisualState();
              applyNoPairsFailVisuals({ plateFadeMs: NO_PAIRS_DIMM_AHEAD_MS, emblemOpacity: 0.2, glowOpacity: 0 });
            }, NO_PAIRS_BADGE_SHOW_DELAY_MS - NO_PAIRS_DIMM_AHEAD_MS);

            window.setTimeout(() => {
              if (noPairsOverlay) {
                noPairsOverlay.classList.add("visible");
              }
              window.setTimeout(() => {
                showNoPairsToastOverlay();
              }, NO_PAIRS_TOAST_AFTER_BADGE_MS);
              window.setTimeout(() => {
                if (noPairsOverlay) {
                  noPairsOverlay.classList.remove("visible");
                }
                window.setTimeout(() => {
                  animateGridFailDespawn(() => {
                    window.setTimeout(() => {
                      currentGrid = new Array(9).fill(0);
                      isAnimating = false;
                      isStepLockedByBetStart = false;
                      finalizeFailWithoutWinModal(finalWin, {
                        noPairsToastDismissAfterBetSheetMs:
                          NO_PAIRS_TOAST_DISMISS_AFTER_BET_SHEET_MS,
                      });
                    }, GRID_FAIL_TO_MODAL_DELAY_MS);
                  });
                }, NO_PAIRS_EMBLEMS_DESPAWN_AFTER_BADGE_HIDE_MS);
              }, NO_PAIRS_BADGE_VISIBLE_MS);
            }, NO_PAIRS_BADGE_SHOW_DELAY_MS);
          });
          return;
        }

        isAnimating = false;
        isStepLockedByBetStart = false;
        updateUI();
      }, coeffBaseBeforeMergeStep);
    }, 130);
  }

  function cashout() {
    if (!sessionAlive || sessionBet <= 0 || totalCoeff <= 0 || isAnimating) {
      return;
    }
    const coeffAtCashout = totalCoeff;
    const cashoutAmount = sessionBet * totalCoeff;
    sessionAlive = false;
    isAnimating = false;
    isStepLockedByBetStart = false;

    if (coeffAtCashout >= CASHOUT_CELEBRATION_MIN_COEFF) {
      showCashoutCelebrationOverlay(cashoutAmount, coeffAtCashout);
      cashoutCelebrationTimer = window.setTimeout(function () {
        cashoutCelebrationTimer = null;
        hideCashoutCelebrationOverlay();
        finalizeFailWithoutWinModal(cashoutAmount, {});
      }, CASHOUT_CELEBRATION_DISPLAY_MS);
    } else {
      setTopToastTitle("Ваш выигрыш");
      setNoPairsToastWinAmount(cashoutAmount);
      showNoPairsToastOverlay();
      const CASHOUT_TO_BET_SHEET_DELAY_MS = 85;
      window.setTimeout(function () {
        finalizeFailWithoutWinModal(cashoutAmount, {
          noPairsToastDismissAfterBetSheetMs: 85,
        });
      }, CASHOUT_TO_BET_SHEET_DELAY_MS);
    }
    updateUI();
  }

  function getMaxBetForSheet() {
    return Math.max(MIN_BET, Math.floor(balance));
  }

  function clampBetAmount(n) {
    let v = Math.floor(Number(n));
    if (!Number.isFinite(v) || v < MIN_BET) v = MIN_BET;
    const cap = getMaxBetForSheet();
    if (v > cap) v = cap;
    return v;
  }

  function readBetFromSheetInput() {
    const raw = String(betSheetInput.value).replace(/\D/g, "");
    const n = parseInt(raw, 10);
    return clampBetAmount(Number.isFinite(n) ? n : MIN_BET);
  }

  function applyBetToSheet(n) {
    betSheetInput.value = String(clampBetAmount(n));
  }

  function markBetSheetSeenInStorage() {
    try {
      localStorage.setItem(BET_SHEET_STORAGE_KEY, "1");
    } catch (e) {}
  }

  function openBetSheetForced() {
    if (betSheetBackdrop.classList.contains("visible")) {
      updateUI();
      return;
    }
    betSheetBackdrop.style.left = "";
    betSheetBackdrop.style.top = "";
    betSheetBackdrop.style.width = "";
    betSheetBackdrop.style.height = "";
    betSheetInput.value = String(baseBetAmount);
    betSheetBackdrop.classList.add("visible");
    betSheetBackdrop.setAttribute("aria-hidden", "false");
    updateUI();
  }

  function finishBetSheet(opts) {
    if (!betSheetBackdrop.classList.contains("visible")) return;
    const startRound = opts && opts.startRound;
    baseBetAmount = readBetFromSheetInput();

    if (startRound) {
      isStepLockedByBetStart = true;
      betSheetBackdrop.classList.remove("visible");
      betSheetBackdrop.setAttribute("aria-hidden", "true");
      updateUI();
      const BET_SHEET_CLOSE_MS = 90;
      window.setTimeout(() => {
        const roundBefore = roundIndex;
        const sessionBetBefore = sessionBet;
        playRound();
        const started =
          roundIndex > roundBefore || sessionBet > sessionBetBefore;
        if (started) {
          markBetSheetSeenInStorage();
        } else {
          isStepLockedByBetStart = false;
          openBetSheetForced();
          updateUI();
        }
      }, BET_SHEET_CLOSE_MS);
      return;
    }

    markBetSheetSeenInStorage();
    betSheetBackdrop.classList.remove("visible");
    betSheetBackdrop.setAttribute("aria-hidden", "true");
    updateUI();
  }

  function openBetSheet() {
    if (!stakeTapOpensBetSheet()) return;
    openBetSheetForced();
  }

  /**
   * Лист ставки при загрузке страницы. Не зависит от localStorage — иначе после прошлых
   * заходов ключ mergeMvpBetSheetSeen блокировал показ. Модалку итога не открывает.
   */
  function openBetSheetAutoIfFirstRun() {
    if (winToastBackdrop.classList.contains("visible")) return;
    openBetSheetForced();
  }

  stepButton.addEventListener("click", playRound);
  document.getElementById("mathProfileMath3").addEventListener("click", function () {
    switchMathProfile("math3");
  });
  document.getElementById("mathProfileMath2").addEventListener("click", function () {
    switchMathProfile("math2");
  });
  cashoutButton.addEventListener("click", cashout);

  document.getElementById("betSheetPanel").addEventListener("click", function (e) {
    e.stopPropagation();
  });
  betSheetMinus.addEventListener("click", function () {
    applyBetToSheet(readBetFromSheetInput() - 1);
  });
  betSheetPlus.addEventListener("click", function () {
    applyBetToSheet(readBetFromSheetInput() + 1);
  });
  document.getElementById("betSheetPresetMin").addEventListener("click", function () {
    applyBetToSheet(MIN_BET);
  });
  document.getElementById("betSheetPresetHalf").addEventListener("click", function () {
    applyBetToSheet(Math.floor(readBetFromSheetInput() / 2));
  });
  document.getElementById("betSheetPresetDouble").addEventListener("click", function () {
    applyBetToSheet(readBetFromSheetInput() * 2);
  });
  document.getElementById("betSheetPresetMax").addEventListener("click", function () {
    applyBetToSheet(getMaxBetForSheet());
  });
  betSheetConfirm.addEventListener("click", function () {
    finishBetSheet({ startRound: true });
  });
  betSheetBackdrop.addEventListener("click", function (e) {
    if (e.target === betSheetBackdrop) {
      finishBetSheet();
    }
  });

  coeffStakeBlock.addEventListener("click", function () {
    openBetSheet();
  });
  coeffStakeBlock.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      openBetSheet();
    }
  });

  (function bootMergeAppAfterAssetWarm() {
    const overlay = document.getElementById("assetPrecacheOverlay");
    const startUi = function () {
      requestAnimationFrame(function () {
        updateUI();
        openBetSheetAutoIfFirstRun();
        scheduleLayoutIntegerSnap();
      });
    };

    /* Оверлей показываем только при первом прогреве в сессии; на повторных загрузках (F5, SPA-переход)
       оверлей скрыт, но UI всё равно стартует только после decode — иначе tileImageDecodeByUrl пуст
       и preloadMergedAnchorFaceUrls конкурирует с фоновым прогревом → мерцание на WebKit. */
    const needsOverlay = shouldShowBlockingAssetWarm();
    fdbg.log("BOOT", "session=" + (needsOverlay ? "FIRST-LOAD (cold, overlay shown)" : "REFRESH (warm, no overlay)"));
    if (needsOverlay) {
      showAssetPrecacheOverlay();
    } else if (overlay) {
      overlay.remove();
    }

    const bootWarmT = performance.now();
    precacheMergeGameAssets()
      .then(function () {
        fdbg.log("BOOT", "precacheMergeGameAssets done in " + (performance.now() - bootWarmT).toFixed(0) + "ms" +
          (performance.now() - bootWarmT < 400 ? " (HTTP cache — fast)" : " (network — slow, first load)"));
        return forceGpuTextureUpload();
      })
      .then(function () {
        fdbg.log("BOOT", "startUi — total warmup " + (performance.now() - bootWarmT).toFixed(0) + "ms");
        if (needsOverlay) {
          markSessionAssetsWarmed();
          hideAssetPrecacheOverlay();
        }
        startUi();
      })
      .catch(function () {
        fdbg.warn("BOOT", "precache ERROR — starting UI anyway");
        if (needsOverlay) {
          hideAssetPrecacheOverlay();
        }
        startUi();
      });
  })();
</script>
</body>
</html>
